name: httpd
type: service
icon: httpd
title: Apache HTTP server
scalable: true

options:
- version: '2.4'
  tag: '2.4'
  default: true

endpoints:
- name: http
  ports:
  - name: http
    number: 80
    protocol: http
    main: true

configs:
- name: main
  title: Main
  filepath: /etc/gotpl/http.conf.tmpl
  config: httpd.conf.tmpl
- name: vhost
  title: Virtual host
  filepath: /etc/gotpl/vhost.conf.tmpl
  config: vhost.conf.tmpl

labels:
- httpd
- apache

build:
  connect: true
  templates:
  - name: nextjs
    title: Next.js
    repo: https://github.com/wodby/nextjs
    branch: main

settings:
- name: docroot
  title: Apache docroot subdir
  var: DOCROOT_SUBDIR

env:
- name: APACHE_DOCUMENT_ROOT
  value: /var/www/html/$(DOCROOT_SUBDIR)

helm:
  name: wodby
  source: oci://registry-1.docker.io/wodby/httpd
  chart: oci://registry-1.docker.io/wodby/httpd
  version: 0.2.0

workloads:
- name: main
  selector:
    matchLabels:
      app.kubernetes.io/instance: '{{service.helm.release}}'
  kind: deployment
  primary: true
  helm:
    labels: commonLabels
    annotations: commonAnnotations
    volumes: extraVolumes
  containers:
  - name: apache
    image: wodby/apache
    build: true
    helm:
      resources: resources
      env: extraEnvVars
      mounts: extraVolumeMounts
